<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 文档助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f4; --surface: #fff; --primary: #4f46e5; --primary-soft: #eef2ff;
      --text: #111827; --text-2: #374151; --muted: #6b7280;
      --border: #e5e7eb; --success: #059669; --error: #dc2626;
      --r: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border-radius: 14px; padding: 36px 32px;
      width: 340px; box-shadow: var(--shadow-lg); }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .form-group  { margin-bottom: 14px; }
    .form-label  { display: block; font-size: 12.5px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    .form-input  { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; }
    .form-input:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .btn-primary { width: 100%; padding: 11px; background: linear-gradient(135deg,#4f46e5,#6366f1);
      color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; }
    .btn-primary:hover { opacity: .9; }
    .err-msg { font-size: 12.5px; color: var(--error); margin-top: 8px; }

    /* ── Layout ── */
    .admin-wrap { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #1c1917; flex-shrink: 0; display: flex; flex-direction: column; }
    .sb-header { padding: 18px 16px 14px; border-bottom: 1px solid #292524; }
    .sb-title  { font-size: 14px; font-weight: 700; color: #e7e5e4; }
    .sb-sub    { font-size: 11px; color: #78716c; margin-top: 2px; }
    .sb-nav    { padding: 10px 8px; flex: 1; }
    .sb-item   { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px;
      cursor: pointer; color: #a8a29e; font-size: 13px; transition: background .12s; border: none;
      background: none; font-family: inherit; width: 100%; text-align: left; }
    .sb-item:hover { background: #292524; color: #e7e5e4; }
    .sb-item.active { background: #3d3834; color: #fff; }
    .sb-footer { padding: 12px 8px; border-top: 1px solid #292524; }
    .btn-logout { width: 100%; padding: 7px 10px; background: none; border: 1px solid #44403c;
      border-radius: 6px; color: #78716c; font-size: 12px; font-family: inherit; cursor: pointer; }
    .btn-logout:hover { border-color: #6366f1; color: #818cf8; }

    .content { flex: 1; padding: 28px 32px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border-radius: var(--r); padding: 18px 20px; box-shadow: var(--shadow); }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-sub   { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; }
    .table-title { font-size: 14px; font-weight: 600; flex: 1; }
    .search-input { padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 13px; font-family: inherit; outline: none; width: 200px; transition: border-color .15s; }
    .search-input:focus { border-color: #a5b4fc; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 16px; text-align: left; font-size: 11.5px; font-weight: 600;
      color: var(--muted); background: #fafafa; border-bottom: 1px solid var(--border); }
    td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px;
      font-size: 11.5px; font-weight: 500; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-gray  { background: #f3f4f6; color: var(--muted); }
    .table-actions { display: flex; gap: 6px; }
    .btn-sm { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-family: inherit;
      cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text-2);
      transition: all .12s; }
    .btn-sm:hover { border-color: #a5b4fc; color: var(--primary); }
    .btn-sm.danger:hover { border-color: #fecaca; color: var(--error); }
    .pagination { display: flex; align-items: center; gap: 8px; padding: 12px 18px;
      border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }
    .pagination button { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: white; cursor: pointer; font-size: 12px; font-family: inherit; transition: all .12s; }
    .pagination button:hover:not(:disabled) { border-color: #a5b4fc; color: var(--primary); }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Providers ── */
    .providers-header { display: flex; align-items: center; margin-bottom: 16px; }
    .providers-header .page-title { margin-bottom: 0; flex: 1; }
    .btn-add { padding: 8px 18px; background: var(--primary); color: white; border: none;
      border-radius: 7px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-add:hover { opacity: .9; }
    .provider-list { display: flex; flex-direction: column; gap: 12px; }
    .provider-card { background: var(--surface); border-radius: var(--r); padding: 16px 20px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; border: 1.5px solid var(--border); }
    .provider-card.is-default { border-color: #a5b4fc; }
    .provider-card.disabled { opacity: .55; }
    .provider-info { flex: 1; min-width: 0; }
    .provider-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
    .provider-meta { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-default { background: #eef2ff; color: var(--primary); padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-off { background: #f3f4f6; color: var(--muted); padding: 1px 7px; border-radius: 4px; font-size: 11px; }
    .provider-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-test { padding: 5px 12px; border-radius: 5px; font-size: 12px; font-family: inherit;
      cursor: pointer; border: 1px solid #a5b4fc; background: #eef2ff; color: var(--primary); transition: all .12s; }
    .btn-test:hover { background: #e0e7ff; }
    .test-result { font-size: 12px; margin-top: 6px; padding: 5px 10px; border-radius: 5px; display: none; }
    .test-ok  { background: #d1fae5; color: #065f46; }
    .test-err { background: #fee2e2; color: #991b1b; }

    /* ── Provider modal ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-check { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
    .form-check input { width: 15px; height: 15px; cursor: pointer; }
    .config-hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

    /* ── Points modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      opacity: 0; visibility: hidden; transition: opacity .2s, visibility .2s; }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal { background: white; border-radius: 14px; width: 360px; padding: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,.15); position: relative; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none;
      font-size: 20px; color: var(--muted); cursor: pointer; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { padding: 8px 18px; border: 1px solid var(--border); border-radius: 7px;
      background: white; font-size: 13px; font-family: inherit; cursor: pointer; }
    .btn-confirm { padding: 8px 18px; background: var(--primary); color: white; border: none;
      border-radius: 7px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
  </style>
</head>
<body>

<!-- 登录 -->
<div id="loginWrap" class="login-wrap" style="display:none">
  <div class="login-card">
    <div class="login-title">管理后台</div>
    <div class="login-sub">文档助手 · Admin</div>
    <div class="form-group">
      <label class="form-label">Admin Token</label>
      <input type="password" id="tokenInput" class="form-input" placeholder="输入 ADMIN_TOKEN">
    </div>
    <button class="btn-primary" onclick="adminLogin()">进入后台</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="adminWrap" class="admin-wrap" style="display:none">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-title">管理后台</div>
      <div class="sb-sub">文档助手</div>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-page="overview" onclick="showPage('overview', this)">📊 概览</button>
      <button class="sb-item" data-page="users" onclick="showPage('users', this)">👥 用户管理</button>
      <button class="sb-item" data-page="config" onclick="showPage('config', this)">⚙️ 模型设置</button>
    </nav>
    <div class="sb-footer">
      <button class="btn-logout" onclick="adminLogout()">退出登录</button>
    </div>
  </aside>

  <main class="content">

    <!-- 概览 -->
    <div class="page active" id="page-overview">
      <div class="page-title">概览</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value" id="s-users">—</div><div class="stat-sub" id="s-todayUsers"></div></div>
        <div class="stat-card"><div class="stat-label">生成记录</div><div class="stat-value" id="s-sessions">—</div><div class="stat-sub" id="s-todaySessions"></div></div>
        <div class="stat-card"><div class="stat-label">已保存文件</div><div class="stat-value" id="s-docs">—</div><div class="stat-sub">累计</div></div>
        <div class="stat-card"><div class="stat-label">积分总余量</div><div class="stat-value" id="s-points">—</div><div class="stat-sub">全体用户</div></div>
      </div>
    </div>

    <!-- 用户管理 -->
    <div class="page" id="page-users">
      <div class="page-title">用户管理</div>
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">用户列表</span>
          <input type="text" class="search-input" id="userSearch" placeholder="搜索手机号 / 昵称" oninput="debounceSearch()">
        </div>
        <table>
          <thead><tr>
            <th>手机号</th><th>昵称</th><th>积分</th><th>生成次数</th><th>注册时间</th><th>操作</th>
          </tr></thead>
          <tbody id="userTable"></tbody>
        </table>
        <div class="pagination" id="userPagination"></div>
      </div>
    </div>

    <!-- 模型设置 -->
    <div class="page" id="page-config">
      <div class="providers-header">
        <div class="page-title">模型设置</div>
        <button class="btn-add" onclick="openProviderModal()">+ 添加 Provider</button>
      </div>
      <div class="provider-list" id="providerList">
        <div style="color:var(--muted);font-size:13px;padding:20px 0">加载中…</div>
      </div>
    </div>

  </main>
</div>

<!-- Provider 编辑弹窗 -->
<div class="modal-overlay" id="providerModal">
  <div class="modal" style="width:480px">
    <button class="modal-close" onclick="closeProviderModal()">×</button>
    <div class="modal-title" id="providerModalTitle">添加 Provider</div>
    <input type="hidden" id="providerEditId">
    <div class="form-group">
      <label class="form-label">名称 <span style="color:var(--error)">*</span></label>
      <input type="text" id="pvName" class="form-input" placeholder="例：Claude (Anthropic)">
    </div>
    <div class="form-group">
      <label class="form-label">Base URL <span style="color:var(--error)">*</span></label>
      <input type="text" id="pvBaseURL" class="form-input" placeholder="https://api.anthropic.com/v1">
    </div>
    <div class="form-group">
      <label class="form-label">API Key</label>
      <input type="password" id="pvApiKey" class="form-input" placeholder="编辑时留空保留原值">
      <div class="config-hint">留空则保留已保存的 Key；显示为 sk-****xxxx 表示已配置</div>
    </div>
    <div class="form-group">
      <label class="form-label">模型名称 <span style="color:var(--error)">*</span></label>
      <input type="text" id="pvModel" class="form-input" placeholder="例：claude-haiku-4-5-20251001">
    </div>
    <div class="form-group" style="display:flex;gap:20px;margin-top:4px">
      <label class="form-check">
        <input type="checkbox" id="pvEnabled" checked>
        启用
      </label>
      <label class="form-check">
        <input type="checkbox" id="pvDefault">
        设为默认
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeProviderModal()">取消</button>
      <button class="btn-confirm" onclick="submitProvider()">保存</button>
    </div>
  </div>
</div>

<!-- 积分操作弹窗 -->
<div class="modal-overlay" id="pointsModal">
  <div class="modal">
    <button class="modal-close" onclick="closePointsModal()">×</button>
    <div class="modal-title" id="pointsModalTitle">调整积分</div>
    <input type="hidden" id="pointsUserId">
    <div class="form-group">
      <label class="form-label">积分变动（正数加，负数减）</label>
      <input type="number" id="pointsDelta" class="form-input" placeholder="例：50 或 -10">
    </div>
    <div class="form-group">
      <label class="form-label">备注原因</label>
      <input type="text" id="pointsReason" class="form-input" placeholder="例：活动赠送">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closePointsModal()">取消</button>
      <button class="btn-confirm" onclick="submitPoints()">确认</button>
    </div>
  </div>
</div>

<script>
'use strict';

let adminToken = '';
let currentPage = 1;
let searchTimer = null;

// ── 登录 ──
async function adminLogin() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    adminToken = token;
    document.getElementById('loginWrap').style.display  = 'none';
    document.getElementById('adminWrap').style.display  = 'flex';
    loadStats();
    loadUsers();
    loadConfig();
  } catch (e) {
    document.getElementById('loginErr').textContent = e.message || '登录失败';
  }
}

async function adminLogout() {
  await fetch('/api/admin/logout', { method: 'POST' });
  adminToken = '';
  document.getElementById('loginWrap').style.display  = 'flex';
  document.getElementById('adminWrap').style.display  = 'none';
}

function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (adminToken && adminToken !== '__cookie__') headers['x-admin-token'] = adminToken;
  return fetch('/api/admin' + path, {
    ...opts,
    credentials: 'same-origin',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
}

// ── 页面切换 ──
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'users') loadUsers();
  if (name === 'overview') loadStats();
  if (name === 'config') loadConfig();
}

// ── 概览 ──
async function loadStats() {
  const r = await api('/stats');
  const d = await r.json();
  document.getElementById('s-users').textContent    = d.totalUsers;
  document.getElementById('s-sessions').textContent = d.totalSessions;
  document.getElementById('s-docs').textContent     = d.totalDocs;
  document.getElementById('s-points').textContent   = d.totalPoints;
  document.getElementById('s-todayUsers').textContent    = `今日新增 ${d.todayUsers}`;
  document.getElementById('s-todaySessions').textContent = `今日生成 ${d.todaySessions}`;
}

// ── 用户列表 ──
async function loadUsers(page = 1) {
  currentPage = page;
  const q   = document.getElementById('userSearch').value.trim();
  const url = `/users?page=${page}&limit=20${q ? '&q=' + encodeURIComponent(q) : ''}`;
  const r   = await api(url);
  const d   = await r.json();

  document.getElementById('userTable').innerHTML = (d.users || []).map(u => `
    <tr>
      <td>${esc(u.phone)}</td>
      <td>${esc(u.nickname || '—')}</td>
      <td><span class="badge badge-green">${u.points}</span></td>
      <td>${u.session_count}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td>
        <div class="table-actions">
          <button class="btn-sm" onclick="openPointsModal(${u.id}, '${esc(u.phone)}')">调整积分</button>
        </div>
      </td>
    </tr>
  `).join('');

  const total = d.total || 0;
  const pages = Math.ceil(total / 20);
  document.getElementById('userPagination').innerHTML = `
    <button onclick="loadUsers(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>
    <span>第 ${page} / ${pages || 1} 页，共 ${total} 人</span>
    <button onclick="loadUsers(${page + 1})" ${page >= pages ? 'disabled' : ''}>下一页</button>
  `;
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadUsers(1), 400);
}

// ── 积分弹窗 ──
function openPointsModal(id, phone) {
  document.getElementById('pointsUserId').value       = id;
  document.getElementById('pointsModalTitle').textContent = `调整积分 · ${phone}`;
  document.getElementById('pointsDelta').value        = '';
  document.getElementById('pointsReason').value       = '';
  document.getElementById('pointsModal').classList.add('visible');
}

function closePointsModal() {
  document.getElementById('pointsModal').classList.remove('visible');
}

async function submitPoints() {
  const id     = document.getElementById('pointsUserId').value;
  const delta  = parseInt(document.getElementById('pointsDelta').value);
  const reason = document.getElementById('pointsReason').value.trim();
  if (!delta || isNaN(delta)) { alert('请输入有效的积分数量'); return; }

  const r = await api(`/users/${id}/points`, { method: 'POST', body: { delta, reason } });
  const d = await r.json();
  if (!r.ok) { alert(d.error); return; }
  closePointsModal();
  loadUsers(currentPage);
  loadStats();
}

// ── Providers ──
let _providers = [];

function renderProviders(providers) {
  const el = document.getElementById('providerList');
  if (!providers.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0">暂无 Provider，点击右上角添加</div>';
    return;
  }
  el.innerHTML = providers.map(p => `
    <div class="provider-card${p.isDefault ? ' is-default' : ''}${!p.enabled ? ' disabled' : ''}" id="pcard-${p.id}">
      <div class="provider-info">
        <div class="provider-name">
          ${esc(p.name)}
          ${p.isDefault ? '<span class="badge-default">默认</span>' : ''}
          ${!p.enabled ? '<span class="badge-off">已禁用</span>' : ''}
        </div>
        <div class="provider-meta">${esc(p.baseURL)} · ${esc(p.model)}${p.apiKey ? ' · Key: ' + esc(p.apiKey) : ' · 无 Key'}</div>
        <div class="test-result" id="tr-${p.id}"></div>
      </div>
      <div class="provider-actions">
        <button class="btn-test" onclick="testProvider('${p.id}')">测试</button>
        <button class="btn-sm" onclick="openProviderModal('${p.id}')">编辑</button>
        <button class="btn-sm danger" onclick="deleteProvider('${p.id}', '${esc(p.name)}')">删除</button>
      </div>
    </div>
  `).join('');
}

async function testProvider(id) {
  const btn = document.querySelector(`#pcard-${id} .btn-test`);
  const res = document.getElementById('tr-' + id);
  btn.disabled = true;
  btn.textContent = '测试中…';
  res.style.display = 'none';
  try {
    const r = await api(`/providers/${id}/test`, { method: 'POST' });
    const d = await r.json();
    res.textContent = d.ok ? '✓ 连通正常：' + d.reply : '✗ ' + d.error;
    res.className = 'test-result ' + (d.ok ? 'test-ok' : 'test-err');
  } catch (e) {
    res.textContent = '✗ 请求失败';
    res.className = 'test-result test-err';
  }
  res.style.display = 'block';
  btn.disabled = false;
  btn.textContent = '测试';
}

function openProviderModal(id) {
  const p = id ? _providers.find(x => x.id === id) : null;
  document.getElementById('providerModalTitle').textContent = p ? '编辑 Provider' : '添加 Provider';
  document.getElementById('providerEditId').value = p ? p.id : '';
  document.getElementById('pvName').value    = p ? p.name    : '';
  document.getElementById('pvBaseURL').value = p ? p.baseURL : '';
  document.getElementById('pvApiKey').value  = '';
  document.getElementById('pvModel').value   = p ? p.model   : '';
  document.getElementById('pvEnabled').checked = p ? p.enabled   : true;
  document.getElementById('pvDefault').checked = p ? p.isDefault : false;
  document.getElementById('providerModal').classList.add('visible');
}

function closeProviderModal() {
  document.getElementById('providerModal').classList.remove('visible');
}

async function submitProvider() {
  const id      = document.getElementById('providerEditId').value;
  const payload = {
    name:      document.getElementById('pvName').value.trim(),
    baseURL:   document.getElementById('pvBaseURL').value.trim(),
    apiKey:    document.getElementById('pvApiKey').value.trim(),
    model:     document.getElementById('pvModel').value.trim(),
    enabled:   document.getElementById('pvEnabled').checked,
    isDefault: document.getElementById('pvDefault').checked,
  };
  if (!payload.name || !payload.baseURL || !payload.model) {
    alert('名称、Base URL、模型名称为必填'); return;
  }
  const r = await api(id ? `/providers/${id}` : '/providers', {
    method: id ? 'PUT' : 'POST', body: payload,
  });
  const d = await r.json();
  if (!r.ok) { alert(d.error || '操作失败'); return; }
  closeProviderModal();
  loadConfig();
}

async function deleteProvider(id, name) {
  if (!confirm(`确认删除 Provider「${name}」？`)) return;
  const r = await api(`/providers/${id}`, { method: 'DELETE' });
  if (!r.ok) { const d = await r.json(); alert(d.error || '删除失败'); return; }
  loadConfig();
}

async function loadConfig() {
  const r = await api('/providers');
  const d = await r.json();
  _providers = d.providers || [];
  renderProviders(_providers);
}

// ── 工具 ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  return new Date(s).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('visible');
});
document.getElementById('tokenInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

// ── 初始化：检查是否已有有效 cookie ──
(async () => {
  const r = await fetch('/api/admin/stats'); // 带 cookie 自动鉴权
  if (r.ok) {
    adminToken = '__cookie__';
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'flex';
    loadStats(); loadUsers(); loadConfig();
  } else {
    document.getElementById('loginWrap').style.display = 'flex';
  }
})();
</script>
